<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Lotto Analyzer">
    <meta name="theme-color" content="#0f172a">
    <title>Lotto Advanced Analyzer</title>
    <style>
        :root {
            --color-bg-primary: #0f172a;
            --color-surface: #1e293b;
            --color-text-primary: #f1f5f9;
            --color-text-secondary: #cbd5e1;
            --color-primary: #38bdf8;
            --color-success: #10b981;
            --color-warning: #f59e0b;
            --color-error: #ef4444;
            --color-danger: #dc2626;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--color-bg-primary); color: var(--color-text-primary); padding: 20px; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { margin-bottom: 30px; text-align: center; font-size: 2.5rem; color: var(--color-primary); }
        h2 { color: var(--color-primary); margin: 25px 0 15px 0; font-size: 1.3rem; border-bottom: 2px solid rgba(56,189,248,0.3); padding-bottom: 10px; }
        .control-panel { background: var(--color-surface); padding: 20px; border-radius: 8px; margin-bottom: 30px; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .control-group { display: flex; flex-direction: column; }
        label { font-size: 0.9rem; margin-bottom: 8px; color: var(--color-text-secondary); font-weight: 500; }
        input, select { padding: 10px; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; background: rgba(0,0,0,0.2); color: var(--color-text-primary); font-size: 1rem; }
        input[type="file"] { cursor: pointer; padding: 8px; }
        input:focus, select:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(56,189,248,0.1); }
        button { padding: 10px 20px; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
        .btn-primary { background: var(--color-primary); color: #0f172a; }
        .btn-primary:hover { background: #0ea5e9; transform: translateY(-2px); }
        .btn-secondary { background: var(--color-surface); color: var(--color-text-primary); border: 1px solid rgba(255,255,255,0.2); }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); }
        .btn-small { padding: 6px 12px; font-size: 0.85rem; margin-bottom: 5px; }
        .controls-wrapper { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
        .file-info { background: rgba(16,185,129,0.1); border: 1px solid var(--color-success); color: #6ee7b7; padding: 10px 15px; border-radius: 6px; font-size: 0.9rem; display: none; grid-column: 1/-1; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: var(--color-surface); padding: 20px; border-radius: 8px; border-left: 4px solid var(--color-primary); }
        .stat-value { font-size: 2rem; font-weight: bold; color: var(--color-primary); margin: 10px 0; }
        .stat-label { color: var(--color-text-secondary); font-size: 0.9rem; }
        .error { background: rgba(239,68,68,0.1); border: 1px solid var(--color-error); color: #fca5a5; padding: 15px; border-radius: 6px; margin-bottom: 20px; }
        .loading { text-align: center; padding: 20px; color: var(--color-text-secondary); }
        .spinner { border: 3px solid rgba(56,189,248,0.2); border-top: 3px solid var(--color-primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .analysis-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .analysis-card { background: var(--color-surface); padding: 20px; border-radius: 8px; border: 1px solid rgba(56,189,248,0.2); }
        .analysis-title { color: var(--color-primary); font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; font-size: 1.1rem; }
        .analysis-icon { font-size: 1.5rem; }
        .number-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.95rem; }
        .number-row:last-child { border-bottom: none; }
        .number-badge { display: inline-block; background: var(--color-primary); color: #0f172a; padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }
        .badge-hot { background: var(--color-warning); color: #000; }
        .badge-overdue { background: var(--color-danger); color: #fff; }
        .chart-bar { display: flex; align-items: center; margin-bottom: 8px; gap: 10px; }
        .chart-label { width: 40px; text-align: right; color: var(--color-text-secondary); font-size: 0.9rem; }
        .chart-fill { flex: 1; height: 20px; background: linear-gradient(90deg, var(--color-primary), var(--color-success)); border-radius: 3px; position: relative; }
        .chart-value { position: absolute; right: 5px; top: 2px; color: #0f172a; font-size: 0.75rem; font-weight: bold; }
        .generator-section { background: var(--color-surface); padding: 20px; border-radius: 8px; border: 2px solid rgba(56,189,248,0.3); margin-top: 30px; }
        .generator-controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .combination-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 15px; }
        .combination-card { background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.3); border-radius: 6px; padding: 12px; text-align: center; }
        .combination-numbers { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
        .combination-number { width: 28px; height: 28px; background: var(--color-primary); color: #0f172a; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.85rem; }
        .method-selector { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        .method-btn { padding: 8px 16px; border: 2px solid rgba(56,189,248,0.3); background: transparent; color: var(--color-primary); border-radius: 6px; cursor: pointer; transition: all 0.3s ease; font-weight: 600; }
        .method-btn.active { background: var(--color-primary); color: #0f172a; border-color: var(--color-primary); }
        .method-btn:hover { border-color: var(--color-primary); }
        @media (max-width: 768px) { .analysis-grid { grid-template-columns: 1fr; } h1 { font-size: 1.8rem; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎰 Lotto Advanced Analyzer</h1>

        <div class="control-panel">
            <div class="control-group">
                <label>📂 Wgraj plik lotto.csv:</label>
                <input type="file" id="csvFile" accept=".csv" onchange="handleFileUpload(event)">
            </div>
            <div class="control-group">
                <label>Liczba ostatnich losowań do analizy:</label>
                <input type="number" id="drawCount" value="100" min="20" max="9999">
            </div>
            <div class="controls-wrapper" style="grid-column: 1/-1;">
                <button class="btn-primary" onclick="analyzeLoaded()">▶ Analizuj</button>
                <button class="btn-secondary" onclick="clearAll()">Wyczyść</button>
            </div>
            <div class="file-info" id="fileInfo"></div>
        </div>

        <div id="error" class="error" style="display: none;"></div>
        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Analiza danych...</p>
        </div>

        <div id="analysisContent" style="display: none;">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Analizowanych Losowań</div>
                    <div class="stat-value" id="totalDraws">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Ostatnie Losowanie</div>
                    <div class="stat-value" id="lastDrawDate" style="font-size: 1.2rem;">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Entropia Systemu</div>
                    <div class="stat-value" id="systemEntropy" style="font-size: 1.2rem;">-</div>
                </div>
            </div>

            <div class="analysis-grid">
                <div class="analysis-card">
                    <div class="analysis-title"><span class="analysis-icon">🔥</span> Gorące Liczby</div>
                    <div id="hotNumbers"></div>
                </div>
                <div class="analysis-card">
                    <div class="analysis-title"><span class="analysis-icon">❄️</span> Zimne Liczby</div>
                    <div id="coldNumbers"></div>
                </div>
                <div class="analysis-card">
                    <div class="analysis-title"><span class="analysis-icon">⏰</span> Zaległe Liczby</div>
                    <div id="overdueNumbers"></div>
                </div>
                <div class="analysis-card">
                    <div class="analysis-title"><span class="analysis-icon">📊</span> Analiza Gap</div>
                    <div id="gapAnalysis"></div>
                </div>
                <div class="analysis-card">
                    <div class="analysis-title"><span class="analysis-icon">🌀</span> Entropia</div>
                    <div id="entropyAnalysis"></div>
                </div>
                <div class="analysis-card">
                    <div class="analysis-title"><span class="analysis-icon">📈</span> Wynik Prawdopodobieństwa</div>
                    <div id="probabilityScore"></div>
                </div>
            </div>

            <div class="generator-section">
                <h2>🎲 Inteligentny Generator Kombinacji</h2>
                <div>
                    <label style="display: block; margin-bottom: 10px;">Wybierz metodę analizy:</label>
                    <div class="method-selector">
                        <button class="method-btn active" onclick="selectMethod('hot', event)">🔥 Gorące</button>
                        <button class="method-btn" onclick="selectMethod('cold', event)">❄️ Zimne</button>
                        <button class="method-btn" onclick="selectMethod('overdue', event)">⏰ Zaległe</button>
                        <button class="method-btn" onclick="selectMethod('entropy', event)">🌀 Entropia</button>
                        <button class="method-btn" onclick="selectMethod('probability', event)">📈 Prawdopodobieństwo</button>
                    </div>
                </div>
                <div class="generator-controls">
                    <div class="control-group">
                        <label>Liczba Kombinacji:</label>
                        <input type="number" id="combinationCount" value="5" min="1" max="50">
                    </div>
                    <div class="control-group">
                        <label style="visibility: hidden;">Generuj</label>
                        <button class="btn-primary" onclick="generateCombinations()">Generuj Kombinacje</button>
                    </div>
                </div>
                <div id="combinationsSection" style="display: none;">
                    <div class="combination-grid" id="combinationGrid"></div>
                    <button class="btn-secondary" onclick="copyAllCombinations()" style="margin-top: 20px;">Skopiuj Wszystkie</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let analysisData = null;
        let selectedMethod = 'hot';
        let allDrawsFromCSV = null;

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                allDrawsFromCSV = parseCSV(text);
                const errorDiv = document.getElementById('error');
                const fileInfo = document.getElementById('fileInfo');
                if (allDrawsFromCSV.length === 0) {
                    errorDiv.textContent = 'Błąd: Nie udało się sparsować pliku CSV.';
                    errorDiv.style.display = 'block';
                    fileInfo.style.display = 'none';
                } else {
                    errorDiv.style.display = 'none';
                    document.getElementById('drawCount').max = allDrawsFromCSV.length;
                    fileInfo.textContent = '✅ Wczytano ' + allDrawsFromCSV.length + ' losowań. Najnowsze: ' + new Date(allDrawsFromCSV[0].drawDate).toLocaleDateString('pl-PL');
                    fileInfo.style.display = 'block';
                }
            };
            reader.readAsText(file, 'UTF-8');
        }

        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const draws = [];
            for (const line of lines) {
                const parts = line.trim().split(',');
                if (parts.length < 8) continue;
                const dateParts = parts[1].trim().split('.');
                if (dateParts.length !== 3) continue;
                const drawDate = new Date(dateParts[2] + '-' + dateParts[1] + '-' + dateParts[0]).toISOString();
                const numbers = [parts[2], parts[3], parts[4], parts[5], parts[6], parts[7]]
                    .map(n => parseInt(n.trim()))
                    .filter(n => !isNaN(n) && n >= 1 && n <= 49);
                if (numbers.length === 6) draws.push({ drawDate, numbers });
            }
            draws.sort((a, b) => new Date(b.drawDate) - new Date(a.drawDate));
            return draws;
        }

        function analyzeLoaded() {
            const errorDiv = document.getElementById('error');
            const loadingDiv = document.getElementById('loading');
            const contentDiv = document.getElementById('analysisContent');
            errorDiv.style.display = 'none';
            if (!allDrawsFromCSV || allDrawsFromCSV.length === 0) {
                errorDiv.textContent = 'Błąd: Najpierw wgraj plik CSV z losowaniami.';
                errorDiv.style.display = 'block';
                return;
            }
            const drawCount = Math.min(parseInt(document.getElementById('drawCount').value), allDrawsFromCSV.length);
            loadingDiv.style.display = 'block';
            contentDiv.style.display = 'none';
            setTimeout(() => {
                performAnalysis(allDrawsFromCSV.slice(0, drawCount));
                loadingDiv.style.display = 'none';
                contentDiv.style.display = 'block';
            }, 50);
        }

        function performAnalysis(draws) {
            const analysis = { frequencyMap: {}, skipMap: {}, gapFrequency: {} };
            for (let i = 1; i <= 49; i++) { analysis.frequencyMap[i] = 0; analysis.skipMap[i] = []; }

            draws.forEach((draw, drawIndex) => {
                const numbers = draw.numbers;
                numbers.forEach(num => { analysis.frequencyMap[num]++; });
                const sorted = [...numbers].sort((a, b) => a - b);
                for (let i = 0; i < sorted.length - 1; i++) {
                    const gap = sorted[i + 1] - sorted[i];
                    analysis.gapFrequency[gap] = (analysis.gapFrequency[gap] || 0) + 1;
                }
                numbers.forEach(num => {
                    if (analysis.skipMap[num].length > 0) {
                        const lastIndex = analysis.skipMap[num][analysis.skipMap[num].length - 1];
                        analysis.skipMap[num].push(drawIndex - lastIndex);
                    }
                    analysis.skipMap[num].push(drawIndex);
                });
            });

            const totalAppearances = Object.values(analysis.frequencyMap).reduce((a, b) => a + b, 0);
            const maxFreq = Math.max(...Object.values(analysis.frequencyMap));
            const minFreq = Math.min(...Object.values(analysis.frequencyMap));

            const hotNumbers = Object.entries(analysis.frequencyMap).filter(([_, c]) => c >= maxFreq * 0.75).sort((a, b) => b[1] - a[1]).slice(0, 10);
            const coldNumbers = Object.entries(analysis.frequencyMap).filter(([_, c]) => c <= minFreq + (maxFreq - minFreq) * 0.25).sort((a, b) => a[1] - b[1]).slice(0, 10);

            const overdueNumbers = [];
            Object.entries(analysis.skipMap).forEach(([num, skips]) => {
                if (skips.length > 1) {
                    const gaps = [];
                    for (let i = 0; i < skips.length - 1; i++) gaps.push(skips[i + 1] - skips[i]);
                    const avgGap = gaps.reduce((a, b) => a + b, 0) / gaps.length;
                    const lastGap = draws.length - skips[skips.length - 1];
                    const deviation = (lastGap - avgGap) / Math.sqrt(avgGap);
                    overdueNumbers.push({ number: parseInt(num), lastGap, avgGap: avgGap.toFixed(1), deviation: deviation.toFixed(2) });
                }
            });
            overdueNumbers.sort((a, b) => b.deviation - a.deviation);

            const sortedGaps = Object.entries(analysis.gapFrequency).sort((a, b) => b[1] - a[1]).slice(0, 8);

            const entropyScores = {};
            Object.entries(analysis.frequencyMap).forEach(([num, freq]) => {
                const p = freq / totalAppearances;
                entropyScores[num] = p > 0 ? -(p * Math.log2(p)) : 0;
            });

            const sortedEntropy = Object.entries(entropyScores)
                .map(([num, entropy]) => ({ number: parseInt(num), entropy: entropy.toFixed(4), frequency: analysis.frequencyMap[num] }))
                .sort((a, b) => b.entropy - a.entropy).slice(0, 10);

            const probabilityScores = {};
            Object.keys(analysis.frequencyMap).forEach(num => {
                const numInt = parseInt(num);
                const freq = analysis.frequencyMap[numInt];
                const freqScore = freq / maxFreq;
                const overdue = overdueNumbers.find(o => o.number === numInt);
                const overdueScore = overdue ? Math.abs(parseFloat(overdue.deviation)) / 5 : 0;
                const entropyScore = parseFloat(entropyScores[num]) / Math.log2(49);
                probabilityScores[num] = { number: numInt, score: (freqScore * 0.3 + overdueScore * 0.4 + entropyScore * 0.3).toFixed(3) };
            });

            const sortedProbability = Object.values(probabilityScores).sort((a, b) => b.score - a.score).slice(0, 10);

            analysisData = { draws, hotNumbers, coldNumbers, overdueNumbers, sortedGaps, sortedEntropy, sortedProbability, analysis };
            displayAnalysis();
        }

        function displayAnalysis() {
            const data = analysisData;
            document.getElementById('totalDraws').textContent = data.draws.length;
            document.getElementById('lastDrawDate').textContent = new Date(data.draws[0].drawDate).toLocaleDateString('pl-PL');

            let systemEntropy = 0;
            Object.values(data.analysis.frequencyMap).forEach(freq => {
                if (freq > 0) { const p = freq / (data.draws.length * 6); systemEntropy -= p * Math.log2(p); }
            });
            document.getElementById('systemEntropy').textContent = (systemEntropy / Math.log2(49) * 100).toFixed(1) + '%';

            document.getElementById('hotNumbers').innerHTML = data.hotNumbers.map(([num, count]) =>
                '<div class="number-row"><span class="number-badge badge-hot">' + num + '</span><span>' + count + ' powtórzeń</span></div>').join('');

            document.getElementById('coldNumbers').innerHTML = data.coldNumbers.map(([num, count]) =>
                '<div class="number-row"><span class="number-badge">' + num + '</span><span>' + count + ' powtórzeń</span></div>').join('');

            document.getElementById('overdueNumbers').innerHTML = data.overdueNumbers.slice(0, 6).map(item =>
                '<div class="number-row"><span class="number-badge badge-overdue">' + item.number + '</span><div style="font-size:0.85rem;">Przerwa: ' + item.lastGap + ' | Śred: ' + item.avgGap + '</div></div>').join('');

            document.getElementById('gapAnalysis').innerHTML = data.sortedGaps.map(([gap, count]) =>
                '<div class="chart-bar"><div class="chart-label">Gap ' + gap + '</div><div class="chart-fill" style="width:' + (count / data.sortedGaps[0][1] * 100) + '%"><div class="chart-value">' + count + '</div></div></div>').join('');

            document.getElementById('entropyAnalysis').innerHTML = data.sortedEntropy.map(item =>
                '<div class="number-row"><span class="number-badge">' + item.number + '</span><div style="font-size:0.85rem;">Entropia: ' + item.entropy + '</div></div>').join('');

            document.getElementById('probabilityScore').innerHTML = data.sortedProbability.map(item =>
                '<div class="chart-bar"><div class="chart-label">' + item.number + '</div><div class="chart-fill" style="width:' + (parseFloat(item.score) * 100) + '%"><div class="chart-value">' + item.score + '</div></div></div>').join('');
        }

        function selectMethod(method, event) {
            selectedMethod = method;
            document.querySelectorAll('.method-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function generateCombinations() {
            let sourceNumbers = [];
            if (selectedMethod === 'hot') sourceNumbers = analysisData.hotNumbers.map(([num]) => parseInt(num));
            else if (selectedMethod === 'cold') sourceNumbers = analysisData.coldNumbers.map(([num]) => parseInt(num));
            else if (selectedMethod === 'overdue') sourceNumbers = analysisData.overdueNumbers.slice(0, 20).map(item => item.number);
            else if (selectedMethod === 'entropy') sourceNumbers = analysisData.sortedEntropy.slice(0, 20).map(item => item.number);
            else if (selectedMethod === 'probability') sourceNumbers = analysisData.sortedProbability.slice(0, 20).map(item => item.number);

            const count = parseInt(document.getElementById('combinationCount').value);
            const combinations = [];
            for (let i = 0; i < count; i++) {
                const combo = [], used = new Set();
                while (combo.length < 6) {
                    const num = sourceNumbers[Math.floor(Math.random() * sourceNumbers.length)];
                    if (!used.has(num)) { combo.push(num); used.add(num); }
                }
                combinations.push(combo.sort((a, b) => a - b));
            }
            displayCombinations(combinations);
        }

        function displayCombinations(combinations) {
            document.getElementById('combinationGrid').innerHTML = combinations.map((combo, idx) =>
                '<div class="combination-card"><div style="color:var(--color-text-secondary);font-size:0.75rem;margin-bottom:8px;">Kom. ' + (idx + 1) + '</div><div class="combination-numbers">' +
                combo.map(num => '<div class="combination-number">' + num + '</div>').join('') +
                '</div><button class="btn-secondary btn-small" onclick="copyCombination(\'' + combo.join(', ') + '\')">Kopiuj</button></div>').join('');
            document.getElementById('combinationsSection').style.display = 'block';
        }

        function copyCombination(text) { navigator.clipboard.writeText(text).then(() => alert('Skopiowano!')); }

        function copyAllCombinations() {
            const text = Array.from(document.querySelectorAll('.combination-card'))
                .map(card => Array.from(card.querySelectorAll('.combination-number')).map(el => el.textContent).join(', ')).join('\n');
            navigator.clipboard.writeText(text).then(() => alert('Skopiowano wszystkie!'));
        }

        function clearAll() {
            document.getElementById('analysisContent').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            document.getElementById('fileInfo').style.display = 'none';
            document.getElementById('csvFile').value = '';
            analysisData = null; allDrawsFromCSV = null; selectedMethod = 'hot';
            document.querySelectorAll('.method-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector('.method-btn').classList.add('active');
        }
    </script>
</body>
</html>
